metadata:
  name: Yamaha STAGEA ELS-03 シリーズ
  manufacturer: Yamaha
  model: ELS-03
  category: electone
  spec: |
    Yamaha STAGEA ELS-03 シリーズ（ELS-03G / ELS-03X / ELS-03XR / ELS-03XF）の入力アダプター。
    MIDI モード: Electone-EL Mode。octave_offset: -1（Yamaha 表記: C3 = note 60）。

    ## 物理構造と操作

    ### 鍵盤（3段）
    上鍵盤（UK）と下鍵盤（LK）は手で演奏する通常の鍵盤。ペダル鍵盤（PK）は足で踏む鍵盤で、
    床に配置されている。いずれもアコースティックピアノと同じく「押す＝Note On、離す＝Note Off」。
    ELS-03 は Note Off を Note On velocity=0（9nH, v=0）で送信する。
    MIDI ドライバーが 9nH,v=0 を noteOff として正規化することを前提とする。
    - 上鍵盤: ch 1, note 48–96（C2–C6 Yamaha 表記）
    - 下鍵盤: ch 2, note 36–96（C1–C6 Yamaha 表記）
    - ペダル鍵盤: ch 3, note 36–60（C1–C3 Yamaha 表記）。非XFモデルは上限 note 55

    ### 横タッチ（Horizontal Touch）
    上・下鍵盤の各キーは水平方向（左右）に押し込むことができる。この入力で Pitch Bend が発生する。
    これは鍵盤単位ではなく鍵盤全体（チャンネル単位）の値として送信される。
    中央=0、左押し込み=負値、右押し込み=正値。ペダル鍵盤には横タッチ機構がない。
    - 上鍵盤横タッチ: Pitch Bend ch 1（-8192–8191 → -1–1 に正規化）
    - 下鍵盤横タッチ: Pitch Bend ch 2（同上）

    ### アフタータッチ（押し込み）
    鍵盤を押した後にさらに強く押し込む操作で連続値を送信する。
    Channel Aftertouch（鍵盤全体の押し込み強度）と Polyphonic Aftertouch（キー単位の押し込み強度）の
    2種類があり、エレクトーン側の設定でどちらを使うか選択できる。ただしこの選択設定自体は MIDI に
    反映されない。送信される MIDI メッセージは両方か Channel のみかを、システムレベルで設定する。
    - Polyphonic Aftertouch: 各鍵盤チャンネル（キー単位）
    - Channel Aftertouch: 各鍵盤チャンネル（鍵盤全体）

    ### エクスプレッションペダル
    足元に2本並んでいるペダル。どちらもボリュームやエフェクトの調整に使う連続値ペダル。
    物理構造の違い：右ペダルは離しても踏み込んだ位置を維持する（値を保持）。
    左ペダルは離すと常に中央位置に戻る（バネで自動復帰）。
    左ペダル = セカンドエクスプレッション。
    - エクスプレッション（右）: CC#11 on ch 16（0x00–0x7F → 0–1 に正規化）
    - セカンドエクスプレッション（左）: CC#4 on ch 16（同上）

    ### フット/ニースイッチ
    足や膝で操作する ON/OFF スイッチ。踏む/当てる=ON、離す=OFF。
    - 左フットスイッチ: EL Controller SysEx cc=0x45（dd: 0x00=OFF, 0x7F=ON）
    - 右フットスイッチ: EL Controller SysEx cc=0x46（同上）
    - ニーレバー: EL Controller SysEx cc=0x47（同上）
      右膝付近に設置されたレバー。3つの状態を持つ：
        1. 常時 ON（ロック）: レバーを左に倒してロックすると、右膝に干渉しない位置に固定され常時 ON になる
        2. OFF（待機）: レバーを立てた状態。右膝の右側に位置し、膝が触れていない = OFF
        3. ON（演奏中）: 右膝を右に倒してレバーを押し込む = ON
      サスティンのリアルタイム ON/OFF に使われることが多い。

    ### サステイン
    鍵盤を離しても音を伸ばし続ける設定。パネル上のボタンで ON/OFF する。
    ピアノのダンパーペダルに相当する機能だが、ELS-03 ではパネル操作であり演奏中に頻繁に切り替える
    性質のものではない。
    - 上鍵盤サステイン: Panel Switch SysEx cc=0x50（dd: 0x00=OFF, 0x01=ON）
    - 下鍵盤サステイン: Panel Switch SysEx cc=0x51（同上）
    - ペダルサステイン: Panel Switch SysEx cc=0x52（同上）

    ### レジストレーション
    音色・音量・エフェクトなどの設定セット（レジスト）を瞬時に切り替えるボタン群。
    1–16 番まであり、演奏中に曲の場面に応じて手動で切り替える。
    エレクトーンにはシーケンス設定によるレジストの自動切り替え機能があるが、この自動切り替えは
    MIDI に反映されない。MIDI に送信されるのは手動操作による切り替えのみ。
    - Program Change on ch 16（0x00–0x0F → Reg 1–16）

    ### テンポ
    内蔵リズムの BPM を示す。リズム再生中にテンポを変更すると送信される。
    - EL Controller SysEx（2バイトエンコード）: F0 43 70 70 40 0x50 TL TH F7（40–280 BPM）
    - デコード: tempo = (TH << 2) | ((TL >> 5) & 0x03)

    ### リズムスタート/ストップ・小節信号
    内蔵リズムパターンの再生制御。スタートボタン押下でリズムが始まり、各小節頭に信号が来る。
    - リズムスタート: MIDI Real-Time 0xFA（pulser）
    - リズムストップ: MIDI Real-Time 0xFC（pulser）
    - 小節信号: SysEx F0 43 70 70 78 0x00 0x00 0xF7（各小節の先頭で送信、pulser）

    ### リズムシーケンス
    リズムパターンの変奏（バリエーション）を切り替えるボタン。曲中の盛り上がりや場面転換に使う。
    - SEQ 1–4: Panel Switch SysEx cc=0x61–0x64（dd: 0x00=OFF, 0x01=ON）

    ### ロータリースピーカー
    スピーカーが回転するエフェクトの ON/OFF。オルガンの「レスリースピーカー」に相当。
    - Panel Switch SysEx cc=0x60（dd: 0x00=OFF, 0x01=ON）

    ### スライダー
    パネル上の縦型フェーダー（スライダー）×9本。各パートの音量や他のパラメーターにアサインして使う。
    上に動かすほど値が大きくなる。
    - スライダー 1–9: EL Controller SysEx cc=0x51–0x59（dd: 0x00–0x7F → 0–1 に正規化）

    ## SysEx フォーマット概要
    EL Controller: F0 43 70 70 40 <cc> <dd> F7
      Volume型 dd = 0x00–0x7F / Switch型 dd = 0x00(OFF), 0x7F(ON)
    Panel Switch: F0 43 70 78 41 <cc> <dd> F7
      Switch型 dd = 0x00(OFF), 0x01(ON)

direction: input

definition:
  octave_offset: -1   # Yamaha 規格: C3 = note 60（標準 C4 = note 60）

  components:

    # ===== 鍵盤 =====

    - id: upper
      type: keyboard
      key_range: [c2, c6]   # note 48–96（上鍵盤 / 全モデル共通）
      additionals:           # pressed は宣言不要（primitive）
        - name: pressure     # Polyphonic Aftertouch（キー単位の押し込み）
          type: float
          range: [0, 1]

    - id: lower
      type: keyboard
      key_range: [c1, c6]   # note 36–96（下鍵盤 / 全モデル共通）
      additionals:
        - name: pressure     # Polyphonic Aftertouch（キー単位の押し込み）
          type: float
          range: [0, 1]

    - id: pedal
      type: keyboard
      key_range: [c1, c3]   # note 36–60（ELS-03XF の範囲。XF は上位互換のためこの範囲で全モデルに対応可）
                             # 非 XF（G/X/XR）では note 56–60 は送信されないが、設定として保持する

    # ===== 横タッチ（Pitch Bend / Horizontal Touch） =====
    # Pitch Bend はチャンネル全体（鍵盤単位）の値。キー単位ではない。
    # 上鍵盤: UK Horizontal Touch → Pitch Bend ch 1
    # 下鍵盤: LK Horizontal Touch → Pitch Bend ch 2
    # ペダル鍵盤: Pitch Bend 非送信

    - id: upper_horizontal
      type: slider
      range: [-1, 1]
      valueType: float

    - id: lower_horizontal
      type: slider
      range: [-1, 1]
      valueType: float

    # ===== チャンネルアフタータッチ（鍵盤単位） =====
    # Polyphonic AT（キー単位）は keyboard の pressure additionals に含まれる。
    # Channel AT（鍵盤全体）は別コンポーネントとしてモデル化。

    - id: upper_aftertouch
      type: slider
      range: [0, 1]
      valueType: float   # Channel Aftertouch ch 1

    - id: lower_aftertouch
      type: slider
      range: [0, 1]
      valueType: float   # Channel Aftertouch ch 2

    - id: pedal_aftertouch
      type: slider
      range: [0, 1]
      valueType: float   # Channel Aftertouch ch 3

    # ===== エクスプレッションペダル =====
    # CC#11 on ch 16

    - id: expression
      type: slider
      range: [0, 1]
      valueType: float

    # ===== セカンドエクスプレッションペダル =====
    # CC#4 on ch 16

    - id: expression_2
      type: slider
      range: [0, 1]
      valueType: float

    # ===== サステイン =====
    # Panel Switch Event（F0 43 70 78 41 cc dd F7）で送信
    # cc=0x50: 上鍵盤サステイン / 0x51: 下鍵盤サステイン / 0x52: ペダルサステイン
    # dd: 00=OFF, 01=ON

    - id: upper_sustain
      type: switch

    - id: lower_sustain
      type: switch

    - id: pedal_sustain
      type: switch

    # ===== フット / ニースイッチ =====
    # EL Controller SysEx（F0 43 70 70 40 cc dd F7）で送信
    # cc=0x45: 左フットスイッチ / 0x46: 右フットスイッチ / 0x47: ニーレバー
    # dd: 00=OFF, 7F=ON

    - id: foot_switch_left
      type: switch

    - id: foot_switch_right
      type: switch

    - id: knee_lever
      type: switch

    # ===== レジストレーション =====
    # Program Change on ch 16: 0x00–0x0F = Reg 1–16

    - id: registration
      type: slider
      range: [1, 16]
      valueType: int

    # ===== リズムスタート / ストップ =====
    # MIDI Real-Time: Start (0xFA) / Stop (0xFC)

    - id: rhythm_start
      type: pulser

    - id: rhythm_stop
      type: pulser

    # ===== 小節信号 =====
    # リズム再生中、各小節の先頭で送信される SysEx
    # F0 43 70 70 78 SC NC F7  (ELS: SC=00固定, NC=00固定)

    - id: bar_signal
      type: pulser

    # ===== テンポ =====
    # EL Controller SysEx（2バイトエンコード）
    # F0 43 70 70 40 50 TL TH F7
    # TL: Tempo下位2bit (bits5-6) / TH: Tempo上位7bit (bits0-6)  (range: 40–280)

    - id: tempo
      type: slider
      range: [40, 280]
      valueType: int

    # ===== リズムシーケンス =====
    # Panel Switch Event（F0 43 70 78 41 cc dd F7）cc=0x61–0x64  dd: 00=OFF, 01=ON

    - id: rhythm_sequence_1
      type: switch

    - id: rhythm_sequence_2
      type: switch

    - id: rhythm_sequence_3
      type: switch

    - id: rhythm_sequence_4
      type: switch

    # ===== ロータリースピーカー =====
    # Panel Switch Event（F0 43 70 78 41 cc dd F7）で送信
    # cc=0x60  dd: 00=OFF, 01=ON

    - id: rotary_speaker
      type: switch

    # ===== スライダー（スライダー 1–9） =====
    # EL Controller SysEx cc=0x51–0x59（Volume型 00–7F）

    - id: slider_1
      type: slider
      range: [0, 1]
      valueType: float

    - id: slider_2
      type: slider
      range: [0, 1]
      valueType: float

    - id: slider_3
      type: slider
      range: [0, 1]
      valueType: float

    - id: slider_4
      type: slider
      range: [0, 1]
      valueType: float

    - id: slider_5
      type: slider
      range: [0, 1]
      valueType: float

    - id: slider_6
      type: slider
      range: [0, 1]
      valueType: float

    - id: slider_7
      type: slider
      range: [0, 1]
      valueType: float

    - id: slider_8
      type: slider
      range: [0, 1]
      valueType: float

    - id: slider_9
      type: slider
      range: [0, 1]
      valueType: float

binding:
  input:
    driver: midi
    mappings:

      # =============================================
      # 上鍵盤（ch 1）
      # =============================================

      - from:
          channel: 1
          type: noteOn
        to:
          target: upper.{note}.pressed
          set: true

      - from:
          channel: 1
          type: noteOff
        to:
          target: upper.{note}.pressed
          set: false

      - from:
          channel: 1
          type: polyAftertouch
        to:
          target: upper.{note}.pressure

      - from:
          channel: 1
          type: pitchBend
        to:
          target: upper_horizontal.value

      - from:
          channel: 1
          type: channelAftertouch
        to:
          target: upper_aftertouch.value

      # =============================================
      # 下鍵盤（ch 2）
      # =============================================

      - from:
          channel: 2
          type: noteOn
        to:
          target: lower.{note}.pressed
          set: true

      - from:
          channel: 2
          type: noteOff
        to:
          target: lower.{note}.pressed
          set: false

      - from:
          channel: 2
          type: polyAftertouch
        to:
          target: lower.{note}.pressure

      - from:
          channel: 2
          type: pitchBend
        to:
          target: lower_horizontal.value

      - from:
          channel: 2
          type: channelAftertouch
        to:
          target: lower_aftertouch.value

      # =============================================
      # ペダル鍵盤（ch 3）
      # =============================================

      - from:
          channel: 3
          type: noteOn
        to:
          target: pedal.{note}.pressed
          set: true

      - from:
          channel: 3
          type: noteOff
        to:
          target: pedal.{note}.pressed
          set: false

      - from:
          channel: 3
          type: channelAftertouch
        to:
          target: pedal_aftertouch.value

      # =============================================
      # レジストレーション（Program Change on ch 16）
      # 0x00–0x0F → Reg 1–16
      # =============================================

      - from:
          channel: 16
          type: programChange
        to:
          target: registration.value
          setMap:
            linear:
              when: [0x00, 0x0F]
              set:  [1, 16]

      # =============================================
      # エクスプレッションペダル（CC#11 on ch 16）
      # =============================================

      - from:
          channel: 16
          type: controlChange
          controller: 11
        to:
          target: expression.value

      # =============================================
      # セカンドエクスプレッションペダル（CC#4 on ch 16）
      # =============================================

      - from:
          channel: 16
          type: controlChange
          controller: 4
        to:
          target: expression_2.value

      # =============================================
      # サステイン（Panel Switch SysEx）
      # F0 43 70 78 41 <cc> <dd> F7  (dd: 00=OFF, 01=ON)
      # =============================================

      # Upper Sustain  cc=0x50
      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x78, 0x41, 0x50, {arg1}, 0xF7]
        to:
          target: upper_sustain.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 1
                set: true

      # Lower Sustain  cc=0x51
      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x78, 0x41, 0x51, {arg1}, 0xF7]
        to:
          target: lower_sustain.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 1
                set: true

      # Pedal Sustain  cc=0x52
      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x78, 0x41, 0x52, {arg1}, 0xF7]
        to:
          target: pedal_sustain.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 1
                set: true

      # =============================================
      # フット / ニースイッチ（EL Controller SysEx）
      # F0 43 70 70 40 <cc> <dd> F7  (dd: 00=OFF, 7F=ON)
      # cc=0x45: 左フット / 0x46: 右フット / 0x47: ニーレバー
      # =============================================

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x70, 0x40, 0x45, {arg1}, 0xF7]
        to:
          target: foot_switch_left.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 127
                set: true

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x70, 0x40, 0x46, {arg1}, 0xF7]
        to:
          target: foot_switch_right.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 127
                set: true

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x70, 0x40, 0x47, {arg1}, 0xF7]
        to:
          target: knee_lever.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 127
                set: true

      # =============================================
      # テンポ（EL Controller SysEx）
      # F0 43 70 70 40 50 TL TH F7
      # TL: Tempo下位2bit (bits5-6) / TH: Tempo上位7bit (bits0-6)  (range: 40–280)
      # =============================================

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x70, 0x40, 0x50, {lo}, {hi}, 0xF7]
        to:
          target: tempo.value
          set:
            expr: "(hi << 2) | ((lo >> 5) & 0x03)"

      # =============================================
      # リズムシーケンス（Panel Switch SysEx）
      # F0 43 70 78 41 <cc> <dd> F7  (dd: 00=OFF, 01=ON)
      # cc=0x61: SEQ 1 / 0x62: SEQ 2 / 0x63: SEQ 3 / 0x64: SEQ 4
      # =============================================

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x78, 0x41, 0x61, {arg1}, 0xF7]
        to:
          target: rhythm_sequence_1.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 1
                set: true

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x78, 0x41, 0x62, {arg1}, 0xF7]
        to:
          target: rhythm_sequence_2.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 1
                set: true

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x78, 0x41, 0x63, {arg1}, 0xF7]
        to:
          target: rhythm_sequence_3.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 1
                set: true

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x78, 0x41, 0x64, {arg1}, 0xF7]
        to:
          target: rhythm_sequence_4.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 1
                set: true

      # =============================================
      # ロータリースピーカー（Panel Switch SysEx）
      # F0 43 70 78 41 60 <dd> F7  (dd: 00=OFF, 01=ON)
      # =============================================

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x78, 0x41, 0x60, {arg1}, 0xF7]
        to:
          target: rotary_speaker.pressed
          setMap:
            source: arg1
            map:
              - when: 0
                set: false
              - when: 1
                set: true

      # =============================================
      # リズムスタート / ストップ（MIDI Real-Time）
      # Start: 0xFA / Stop: 0xFC
      # =============================================

      - from:
          type: realtime
          message: start   # 0xFA
        to:
          target: rhythm_start.triggered
          set: pulse

      - from:
          type: realtime
          message: stop    # 0xFC
        to:
          target: rhythm_stop.triggered
          set: pulse

      # =============================================
      # 小節信号（Bar Signal SysEx）
      # F0 43 70 70 78 SC NC F7
      # ELS シリーズは SC=00（Beat Number）, NC=00（Bar Number）固定
      # =============================================

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x70, 0x78, 0x00, 0x00, 0xF7]
        to:
          target: bar_signal.triggered
          set: pulse

      # =============================================
      # スライダー 1–9（EL Controller SysEx）
      # F0 43 70 70 40 <cc> <dd> F7  (cc=0x51–0x59, dd: 00–7F)
      # =============================================

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x70, 0x40, 0x51, {arg1}, 0xF7]
        to:
          target: slider_1.value
          setMap:
            source: arg1
            linear:
              when: [0x00, 0x7f]
              set:  [0, 1]

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x70, 0x40, 0x52, {arg1}, 0xF7]
        to:
          target: slider_2.value
          setMap:
            source: arg1
            linear:
              when: [0x00, 0x7f]
              set:  [0, 1]

      - from:
          type: sysex
          pattern: [0xF0, 0x43, 0x70, 0x70, 0x40, 0x53, {arg1}, 0xF7]
