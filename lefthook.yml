pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,json,svelte,astro}"
      run: pnpm biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt --check
    cargo-clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings
