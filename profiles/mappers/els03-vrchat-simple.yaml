# ELS-03 → VRChat シンプル演奏 変換グラフ
#
# 上鍵盤・下鍵盤・ペダル鍵盤・エクスプレッション×2・スライダー×9・
# ポリアフタータッチ（10スロット）を VRChat アバターパラメーターへ接続する。
#
# ポリアフタータッチの設計:
#   array_merge で lower + upper の pressure 配列を結合する。
#   pressure は押鍵中のみ非 null なので compact で null をオミットし、
#   take で先頭 10 要素に切り詰めてから flatten で個別ポートに展開する。
#   空きスロットは null → defaults(0.0) → to_bits で 0 を送信（VRChat リセット）。
#   VRChat 側では slot 0 → 9 の順に左から値を当てる。
#
# スライダーの設計:
#   to_bits（bits: 3）で float [0,1] を 0–7 の 8段階に量子化してビット分解。

input_devices:
  - devices/yamaha-els03/yamaha-els03.yaml

output_devices:
  - devices/vrchat-osc/vrchat-osc.yaml

graph:
  nodes:

    # ----------------------------------------------------------
    # ポリアフタータッチ: lower + upper をマージして左詰め
    # ----------------------------------------------------------

    # lower / upper の pressure を結合（pressure は押鍵中のみ非 null）
    - id: pressure_merge
      type: array_merge

    # null をオミット
    - id: pressure_compact
      type: compact

    # 先頭 10 要素に切り詰め
    - id: pressure_take
      type: take
      params: { n: 10 }

    # 個別ポートに展開（要素数が 10 未満の場合、余りポートは null）
    - id: pressure_flatten
      type: flatten

    # ----------------------------------------------------------
    # ポリアフタータッチ: 空きスロットのデフォルト値（VRChat リセット用）
    # ----------------------------------------------------------

    - id: pressure_default_0
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_1
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_2
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_3
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_4
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_5
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_6
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_7
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_8
      type: defaults
      params: { value: 0.0 }
    - id: pressure_default_9
      type: defaults
      params: { value: 0.0 }

    # ----------------------------------------------------------
    # ポリアフタータッチ: スロットごとに 3bit 量子化（10スロット）
    # ----------------------------------------------------------

    - id: pressure_0_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_1_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_2_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_3_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_4_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_5_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_6_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_7_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_8_bits
      type: to_bits
      params: { bits: 3 }
    - id: pressure_9_bits
      type: to_bits
      params: { bits: 3 }

    # ----------------------------------------------------------
    # スライダー 1–9: float → 3bit 量子化
    # ----------------------------------------------------------

    - id: slider_1_bits
      type: to_bits
      params: { bits: 3 }
    - id: slider_2_bits
      type: to_bits
      params: { bits: 3 }
    - id: slider_3_bits
      type: to_bits
      params: { bits: 3 }
    - id: slider_4_bits
      type: to_bits
      params: { bits: 3 }
    - id: slider_5_bits
      type: to_bits
      params: { bits: 3 }
    - id: slider_6_bits
      type: to_bits
      params: { bits: 3 }
    - id: slider_7_bits
      type: to_bits
      params: { bits: 3 }
    - id: slider_8_bits
      type: to_bits
      params: { bits: 3 }
    - id: slider_9_bits
      type: to_bits
      params: { bits: 3 }

  connections:

    # ----------------------------------------------------------
    # 鍵盤 押鍵状態（per-key 直結）
    # ----------------------------------------------------------

    # 上鍵盤: ELS-03 note 48–96（Yamaha C2–C6）
    - from: input.upper.{note}.pressed
      to:   output.upper_key.{note}.pressed

    # 下鍵盤: ELS-03 note 36–96（Yamaha C1–C6）
    - from: input.lower.{note}.pressed
      to:   output.lower_key.{note}.pressed

    # ペダル鍵盤: ELS-03 note 36–60（Yamaha C1–C3）
    - from: input.pedal.{note}.pressed
      to:   output.pedal_key.{note}.pressed

    # ----------------------------------------------------------
    # エクスプレッションペダル（直結）
    # ----------------------------------------------------------

    - from: input.expression.value
      to:   output.expression.value

    - from: input.expression_2.value
      to:   output.expression_2.value

    # ----------------------------------------------------------
    # ポリアフタータッチ: array_merge → compact → take → flatten → defaults → to_bits
    # ----------------------------------------------------------

    # lower / upper の pressure を結合
    - from: input.lower.*.pressure
      to:   pressure_merge.in_0
    - from: input.upper.*.pressure
      to:   pressure_merge.in_1

    # null をオミット → 先頭 10 要素 → 個別ポートに展開
    - from: pressure_merge.out
      to:   pressure_compact.in
    - from: pressure_compact.out
      to:   pressure_take.in
    - from: pressure_take.out
      to:   pressure_flatten.in

    # flatten → defaults → to_bits（slot 0–9）
    - from: pressure_flatten.out_0
      to:   pressure_default_0.in
    - from: pressure_default_0.out
      to:   pressure_0_bits.in

    - from: pressure_flatten.out_1
      to:   pressure_default_1.in
    - from: pressure_default_1.out
      to:   pressure_1_bits.in

    - from: pressure_flatten.out_2
      to:   pressure_default_2.in
    - from: pressure_default_2.out
      to:   pressure_2_bits.in

    - from: pressure_flatten.out_3
      to:   pressure_default_3.in
    - from: pressure_default_3.out
      to:   pressure_3_bits.in

    - from: pressure_flatten.out_4
      to:   pressure_default_4.in
    - from: pressure_default_4.out
      to:   pressure_4_bits.in

    - from: pressure_flatten.out_5
      to:   pressure_default_5.in
    - from: pressure_default_5.out
      to:   pressure_5_bits.in

    - from: pressure_flatten.out_6
      to:   pressure_default_6.in
    - from: pressure_default_6.out
      to:   pressure_6_bits.in

    - from: pressure_flatten.out_7
      to:   pressure_default_7.in
    - from: pressure_default_7.out
      to:   pressure_7_bits.in

    - from: pressure_flatten.out_8
      to:   pressure_default_8.in
    - from: pressure_default_8.out
      to:   pressure_8_bits.in

    - from: pressure_flatten.out_9
      to:   pressure_default_9.in
    - from: pressure_default_9.out
      to:   pressure_9_bits.in

    # to_bits → output（slot 0–9）
    - from: pressure_0_bits.bit_0
      to:   output.pressure_0_b0.pressed
    - from: pressure_0_bits.bit_1
      to:   output.pressure_0_b1.pressed
    - from: pressure_0_bits.bit_2
      to:   output.pressure_0_b2.pressed

    - from: pressure_1_bits.bit_0
      to:   output.pressure_1_b0.pressed
    - from: pressure_1_bits.bit_1
      to:   output.pressure_1_b1.pressed
    - from: pressure_1_bits.bit_2
      to:   output.pressure_1_b2.pressed

    - from: pressure_2_bits.bit_0
      to:   output.pressure_2_b0.pressed
    - from: pressure_2_bits.bit_1
      to:   output.pressure_2_b1.pressed
    - from: pressure_2_bits.bit_2
      to:   output.pressure_2_b2.pressed

    - from: pressure_3_bits.bit_0
      to:   output.pressure_3_b0.pressed
    - from: pressure_3_bits.bit_1
      to:   output.pressure_3_b1.pressed
    - from: pressure_3_bits.bit_2
      to:   output.pressure_3_b2.pressed

    - from: pressure_4_bits.bit_0
      to:   output.pressure_4_b0.pressed
    - from: pressure_4_bits.bit_1
      to:   output.pressure_4_b1.pressed
    - from: pressure_4_bits.bit_2
      to:   output.pressure_4_b2.pressed

    - from: pressure_5_bits.bit_0
      to:   output.pressure_5_b0.pressed
    - from: pressure_5_bits.bit_1
      to:   output.pressure_5_b1.pressed
    - from: pressure_5_bits.bit_2
      to:   output.pressure_5_b2.pressed

    - from: pressure_6_bits.bit_0
      to:   output.pressure_6_b0.pressed
    - from: pressure_6_bits.bit_1
      to:   output.pressure_6_b1.pressed
    - from: pressure_6_bits.bit_2
      to:   output.pressure_6_b2.pressed

    - from: pressure_7_bits.bit_0
      to:   output.pressure_7_b0.pressed
    - from: pressure_7_bits.bit_1
      to:   output.pressure_7_b1.pressed
    - from: pressure_7_bits.bit_2
      to:   output.pressure_7_b2.pressed

    - from: pressure_8_bits.bit_0
      to:   output.pressure_8_b0.pressed
    - from: pressure_8_bits.bit_1
      to:   output.pressure_8_b1.pressed
    - from: pressure_8_bits.bit_2
      to:   output.pressure_8_b2.pressed

    - from: pressure_9_bits.bit_0
      to:   output.pressure_9_b0.pressed
    - from: pressure_9_bits.bit_1
      to:   output.pressure_9_b1.pressed
    - from: pressure_9_bits.bit_2
      to:   output.pressure_9_b2.pressed

    # ----------------------------------------------------------
    # スライダー 1–9（float → 3bit）
    # ----------------------------------------------------------

    - from: input.slider_1.value
      to:   slider_1_bits.in
    - from: slider_1_bits.bit_0
      to:   output.slider_1_b0.pressed
    - from: slider_1_bits.bit_1
      to:   output.slider_1_b1.pressed
    - from: slider_1_bits.bit_2
      to:   output.slider_1_b2.pressed

    - from: input.slider_2.value
      to:   slider_2_bits.in
    - from: slider_2_bits.bit_0
      to:   output.slider_2_b0.pressed
    - from: slider_2_bits.bit_1
      to:   output.slider_2_b1.pressed
    - from: slider_2_bits.bit_2
      to:   output.slider_2_b2.pressed

    - from: input.slider_3.value
      to:   slider_3_bits.in
    - from: slider_3_bits.bit_0
      to:   output.slider_3_b0.pressed
    - from: slider_3_bits.bit_1
      to:   output.slider_3_b1.pressed
    - from: slider_3_bits.bit_2
      to:   output.slider_3_b2.pressed

    - from: input.slider_4.value
      to:   slider_4_bits.in
    - from: slider_4_bits.bit_0
      to:   output.slider_4_b0.pressed
    - from: slider_4_bits.bit_1
      to:   output.slider_4_b1.pressed
    - from: slider_4_bits.bit_2
      to:   output.slider_4_b2.pressed

    - from: input.slider_5.value
      to:   slider_5_bits.in
    - from: slider_5_bits.bit_0
      to:   output.slider_5_b0.pressed
    - from: slider_5_bits.bit_1
      to:   output.slider_5_b1.pressed
    - from: slider_5_bits.bit_2
      to:   output.slider_5_b2.pressed

    - from: input.slider_6.value
      to:   slider_6_bits.in
    - from: slider_6_bits.bit_0
      to:   output.slider_6_b0.pressed
    - from: slider_6_bits.bit_1
      to:   output.slider_6_b1.pressed
    - from: slider_6_bits.bit_2
      to:   output.slider_6_b2.pressed

    - from: input.slider_7.value
      to:   slider_7_bits.in
    - from: slider_7_bits.bit_0
      to:   output.slider_7_b0.pressed
    - from: slider_7_bits.bit_1
      to:   output.slider_7_b1.pressed
    - from: slider_7_bits.bit_2
      to:   output.slider_7_b2.pressed

    - from: input.slider_8.value
      to:   slider_8_bits.in
    - from: slider_8_bits.bit_0
      to:   output.slider_8_b0.pressed
    - from: slider_8_bits.bit_1
      to:   output.slider_8_b1.pressed
    - from: slider_8_bits.bit_2
      to:   output.slider_8_b2.pressed

    - from: input.slider_9.value
      to:   slider_9_bits.in
    - from: slider_9_bits.bit_0
      to:   output.slider_9_b0.pressed
    - from: slider_9_bits.bit_1
      to:   output.slider_9_b1.pressed
    - from: slider_9_bits.bit_2
      to:   output.slider_9_b2.pressed
