# VRChat OSC デバイス構成（双方向）
#
# VRChat はアバターパラメーターを OSC で送受信できる。
#   送信（ブリッジ → VRChat）: host 127.0.0.1, port 9000
#   受信（VRChat → ブリッジ）: host 127.0.0.1, port 9001
#
# VRChat OSC アドレス形式: /avatar/parameters/<ParameterName>
#
# VRChat アバターパラメーター型域:
#   bool  : true / false
#   int   : 0–255（byte サイズ）
#   float : 0.0–1.0

direction: any

definition:
  components:

    # ===== 上鍵盤 =====
    # アバターパラメーター: upper_key_{note}（bool）
    # key_range c2–c7 = note 36–96（標準記法）
    - id: upper_key
      type: keyboard
      key_range: [c2, c7]

    # ===== 下鍵盤 =====
    # アバターパラメーター: lower_key_{note}（bool）
    # key_range c2–c7 = note 36–96（標準記法）
    - id: lower_key
      type: keyboard
      key_range: [c2, c7]

    # ===== ペダル鍵盤 =====
    # アバターパラメーター: pedal_key_{note}（bool）
    # key_range c2–c4 = note 36–60（標準記法）
    - id: pedal_key
      type: keyboard
      key_range: [c2, c4]

    # ===== エクスプレッション =====
    # アバターパラメーター: UpperExpression（float 0.0–1.0）
    - id: expression
      type: slider
      range: [0, 1]
      valueType: float

    # ===== セカンドエクスプレッション =====
    # アバターパラメーター: LowerExpression（float 0.0–1.0）
    - id: expression_2
      type: slider
      range: [0, 1]
      valueType: float

    # ===== シーン番号（VRChat → ブリッジ 受信専用） =====
    # アバターパラメーター: SceneIndex（int）
    # VRChat int は 0–255 だが、このアバターでの実用範囲は 0–15。
    # 範囲外（16–255）が到来したときの挙動は out_of_range で制御できる。
    - id: scene_index
      type: number
      valueType: int
      range: [0, 15]
      out_of_range: ignore   # ignore（デフォルト） | clamp | error

binding:

  # ------------------------------------------------------------
  # input: VRChat → ブリッジ（OSC 受信、ポート 9001）
  #
  # from.target: 受信アドレスのパターン。{note} は数字列のキャプチャ。
  # set: value は OSC 第1引数を target に直接代入する（正規化なし）。
  # OSC input では set または setMap が必須。
  # → config/drivers/osc.md binding.input 参照
  # ------------------------------------------------------------
  input:
    driver: osc
    mappings:

      # 上鍵盤 押鍵状態（per-key）
      - from:
          target: /avatar/parameters/upper_key_{note}
          type: bool
        to:
          target: upper_key.{note}.pressed
          set: value

      # 下鍵盤 押鍵状態（per-key）
      - from:
          target: /avatar/parameters/lower_key_{note}
          type: bool
        to:
          target: lower_key.{note}.pressed
          set: value

      # ペダル鍵盤 押鍵状態（per-key）
      - from:
          target: /avatar/parameters/pedal_key_{note}
          type: bool
        to:
          target: pedal_key.{note}.pressed
          set: value

      # エクスプレッション
      - from:
          target: /avatar/parameters/UpperExpression
          type: float
        to:
          target: expression.value
          set: value

      # セカンドエクスプレッション
      - from:
          target: /avatar/parameters/LowerExpression
          type: float
        to:
          target: expression_2.value
          set: value

      # シーン番号
      # VRChat int 全値域（0–255）→ scene_index の range（0–15）に縮小マッピング
      - from:
          target: /avatar/parameters/SceneIndex
          type: int
        to:
          target: scene_index.value
          setMap:
            linear:
              when: [0, 255]
              set:  [0, 15]

  # ------------------------------------------------------------
  # output: ブリッジ → VRChat（OSC 送信、ポート 9000）
  #
  # input と対称なエントリは mirror を使用。
  # → config/drivers/osc.md mirror の逆写像導出 参照
  # ------------------------------------------------------------
  output:
    driver: osc
    mappings:

      - mirror: upper_key.{note}.pressed
      - mirror: lower_key.{note}.pressed
      - mirror: pedal_key.{note}.pressed
      - mirror: expression.value
      - mirror: expression_2.value

      # scene_index は受信専用のため output に含めない
