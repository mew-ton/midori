metadata:
  name: VRChat エレクトーンアバター（汎用）
  category: vrchat-avatar
  spec: |
    エレクトーン演奏を VRChat アバターに同期するための OSC パラメーター構成。
    このアダプターに対応するアバターは、以下のパラメーター命名規則に従って制作されている前提。

    ## 鍵盤パラメーター
    upper_key_{note} / lower_key_{note} / pedal_key_{note}（bool）
    打鍵状態を 1鍵ごとに bool で送信する。note は MIDI ノート番号（標準 C4=60）。
    アバター側では対応する鍵盤キーのアニメーション（押下・復帰）に使用する。
    - upper_key: 上鍵盤, note 36–96
    - lower_key: 下鍵盤, note 36–96
    - pedal_key: ペダル鍵盤, note 36–60

    ## エクスプレッションパラメーター
    UpperExpression / LowerExpression（float, 0.0–1.0）
    右・左エクスプレッションペダルの踏み込み量。
    アバター側では鍵盤アニメーションの勢い表現や、エフェクト（発光・揺れ等）の強度に使用する。
    - UpperExpression: 右ペダル（エクスプレッション, CC#11）
    - LowerExpression: 左ペダル（セカンドエクスプレッション, CC#4）

    ## スライダーパラメーター（3bit ビット圧縮）
    Slider{N}B0 / Slider{N}B1 / Slider{N}B2（bool × 3, N=1–9）
    パネルスライダー 1本の位置（0–1 float）を 3bit（0–7 の 8段階）に量子化し、
    B0（LSB）/ B1 / B2（MSB）の bool 3本で転送する。
    アバター側で 3bit を復号して 8段階のアニメーション（フェーダーの位置等）に使用する。

    ## 圧力パラメーター（3bit ビット圧縮 × 10スロット）
    Pressure{N}B0 / Pressure{N}B1 / Pressure{N}B2（bool × 3, N=0–9）
    押鍵中の鍵の圧力（ポリアフタータッチ）を、低音順に最大 10 キー分スロット割り当てして転送する。
    各スロットの圧力 float を 3bit（0–7）に量子化し、B0(LSB)/B1/B2(MSB) の bool 3本で送信。
    スロット割り当て: slot 0–4 = 下鍵盤の低音側 5鍵 / slot 5–9 = 上鍵盤の低音側 5鍵。
    アバター側では指ごとの押し込み深さアニメーション等に使用する。

    ## シーンインデックス（受信専用）
    SceneIndex（int, 0–15）
    VRChat 側のシーン切り替え（照明・背景等）状態をブリッジが受信するためのパラメーター。
    アバター内の Animator Controller から送信される。ブリッジから VRChat への送信は行わない。

direction: any

definition:
  components:

    # ===== 上鍵盤 =====
    # アバターパラメーター: upper_key_{note}（bool）
    # key_range c2–c7 = note 36–96（標準記法）
    - id: upper_key
      type: keyboard
      key_range: [c2, c7]

    # ===== 下鍵盤 =====
    # アバターパラメーター: lower_key_{note}（bool）
    # key_range c2–c7 = note 36–96（標準記法）
    - id: lower_key
      type: keyboard
      key_range: [c2, c7]

    # ===== ペダル鍵盤 =====
    # アバターパラメーター: pedal_key_{note}（bool）
    # key_range c2–c4 = note 36–60（標準記法）
    - id: pedal_key
      type: keyboard
      key_range: [c2, c4]

    # ===== エクスプレッション =====
    # アバターパラメーター: UpperExpression（float 0.0–1.0）
    - id: expression
      type: slider
      range: [0, 1]
      valueType: float

    # ===== セカンドエクスプレッション =====
    # アバターパラメーター: LowerExpression（float 0.0–1.0）
    - id: expression_2
      type: slider
      range: [0, 1]
      valueType: float

    # ===== スライダー 1–9（各 3bit、出力専用） =====
    # スライダー 1本 = bool × 3（Slider{N}B0〜B2）で 0–7 の 8段階を表現。

    - id: slider_1_b0
      type: switch
    - id: slider_1_b1
      type: switch
    - id: slider_1_b2
      type: switch

    - id: slider_2_b0
      type: switch
    - id: slider_2_b1
      type: switch
    - id: slider_2_b2
      type: switch

    - id: slider_3_b0
      type: switch
    - id: slider_3_b1
      type: switch
    - id: slider_3_b2
      type: switch

    - id: slider_4_b0
      type: switch
    - id: slider_4_b1
      type: switch
    - id: slider_4_b2
      type: switch

    - id: slider_5_b0
      type: switch
    - id: slider_5_b1
      type: switch
    - id: slider_5_b2
      type: switch

    - id: slider_6_b0
      type: switch
    - id: slider_6_b1
      type: switch
    - id: slider_6_b2
      type: switch

    - id: slider_7_b0
      type: switch
    - id: slider_7_b1
      type: switch
    - id: slider_7_b2
      type: switch

    - id: slider_8_b0
      type: switch
    - id: slider_8_b1
      type: switch
    - id: slider_8_b2
      type: switch

    - id: slider_9_b0
      type: switch
    - id: slider_9_b1
      type: switch
    - id: slider_9_b2
      type: switch

    # ===== ポリアフタータッチ 10スロット（各 3bit、出力専用） =====
    # 押鍵中の鍵から左（低音）順に最大 10 キーをピックアップし、
    # 圧力値 float → 3bit（0–7）に圧縮して送信する。
    #
    # スロット割り当て:
    #   slot 0–4 : lower 鍵盤の左詰め 5 キー
    #   slot 5–9 : upper 鍵盤の左詰め 5 キー
    #
    # VRChat 側でのコンポジット: slot 0 → 9 の順に左から反映することで
    # lower（低音）優先の左詰めとなる。

    - id: pressure_0_b0
      type: switch
    - id: pressure_0_b1
      type: switch
    - id: pressure_0_b2
      type: switch

    - id: pressure_1_b0
      type: switch
    - id: pressure_1_b1
      type: switch
    - id: pressure_1_b2
      type: switch

    - id: pressure_2_b0
      type: switch
    - id: pressure_2_b1
      type: switch
    - id: pressure_2_b2
      type: switch

    - id: pressure_3_b0
      type: switch
    - id: pressure_3_b1
      type: switch
    - id: pressure_3_b2
      type: switch

    - id: pressure_4_b0
      type: switch
    - id: pressure_4_b1
      type: switch
    - id: pressure_4_b2
      type: switch

    - id: pressure_5_b0
      type: switch
    - id: pressure_5_b1
      type: switch
    - id: pressure_5_b2
      type: switch

    - id: pressure_6_b0
      type: switch
    - id: pressure_6_b1
      type: switch
    - id: pressure_6_b2
      type: switch

    - id: pressure_7_b0
      type: switch
    - id: pressure_7_b1
      type: switch
    - id: pressure_7_b2
      type: switch

    - id: pressure_8_b0
      type: switch
    - id: pressure_8_b1
      type: switch
    - id: pressure_8_b2
      type: switch

    - id: pressure_9_b0
      type: switch
    - id: pressure_9_b1
      type: switch
    - id: pressure_9_b2
      type: switch

    # ===== シーン番号（VRChat → ブリッジ 受信専用） =====
    # アバターパラメーター: SceneIndex（int）
    # VRChat int は 0–255 だが、このアバターでの実用範囲は 0–15。
    - id: scene_index
      type: number
      direction: input   # 受信専用: ブリッジから VRChat への送信は行わない
      valueType: int
      range: [0, 15]
      out_of_range: ignore

binding:

  # ------------------------------------------------------------
  # input: VRChat → ブリッジ（OSC 受信、ポート 9001）
  # → config/drivers/osc.md binding.input 参照
  # ------------------------------------------------------------
  input:
    driver: osc
    adapter_kind: osc-vrchat
    mappings:

      - from:
          target: /avatar/parameters/upper_key_{note}
          type: bool
        to:
          target: upper_key.{note}.pressed
          set: value

      - from:
          target: /avatar/parameters/lower_key_{note}
          type: bool
        to:
          target: lower_key.{note}.pressed
          set: value

      - from:
          target: /avatar/parameters/pedal_key_{note}
          type: bool
        to:
          target: pedal_key.{note}.pressed
          set: value

      - from:
          target: /avatar/parameters/UpperExpression
          type: float
        to:
          target: expression.value
          set: value

      - from:
          target: /avatar/parameters/LowerExpression
          type: float
        to:
          target: expression_2.value
          set: value

      - from:
          target: /avatar/parameters/SceneIndex
          type: int
        to:
          target: scene_index.value
          setMap:
            linear:
              when: [0, 255]
              set:  [0, 15]

  # ------------------------------------------------------------
  # output: ブリッジ → VRChat（OSC 送信、ポート 9000）
  # → config/drivers/osc.md mirror の逆写像導出 参照
  # ------------------------------------------------------------
  output:
    driver: osc
    adapter_kind: osc-vrchat
    mappings:

      - mirror: upper_key.{note}.pressed
      - mirror: lower_key.{note}.pressed
      - mirror: pedal_key.{note}.pressed
      - mirror: expression.value
      - mirror: expression_2.value

      # スライダー 1–9（各 3bit）
      - from: { target: slider_1_b0.pressed }
        to:   { address: /avatar/parameters/Slider1B0, type: bool }
      - from: { target: slider_1_b1.pressed }
        to:   { address: /avatar/parameters/Slider1B1, type: bool }
      - from: { target: slider_1_b2.pressed }
        to:   { address: /avatar/parameters/Slider1B2, type: bool }

      - from: { target: slider_2_b0.pressed }
        to:   { address: /avatar/parameters/Slider2B0, type: bool }
      - from: { target: slider_2_b1.pressed }
        to:   { address: /avatar/parameters/Slider2B1, type: bool }
      - from: { target: slider_2_b2.pressed }
        to:   { address: /avatar/parameters/Slider2B2, type: bool }

      - from: { target: slider_3_b0.pressed }
        to:   { address: /avatar/parameters/Slider3B0, type: bool }
      - from: { target: slider_3_b1.pressed }
        to:   { address: /avatar/parameters/Slider3B1, type: bool }
      - from: { target: slider_3_b2.pressed }
        to:   { address: /avatar/parameters/Slider3B2, type: bool }

      - from: { target: slider_4_b0.pressed }
        to:   { address: /avatar/parameters/Slider4B0, type: bool }
      - from: { target: slider_4_b1.pressed }
        to:   { address: /avatar/parameters/Slider4B1, type: bool }
      - from: { target: slider_4_b2.pressed }
        to:   { address: /avatar/parameters/Slider4B2, type: bool }

      - from: { target: slider_5_b0.pressed }
        to:   { address: /avatar/parameters/Slider5B0, type: bool }
      - from: { target: slider_5_b1.pressed }
        to:   { address: /avatar/parameters/Slider5B1, type: bool }
      - from: { target: slider_5_b2.pressed }
        to:   { address: /avatar/parameters/Slider5B2, type: bool }

      - from: { target: slider_6_b0.pressed }
        to:   { address: /avatar/parameters/Slider6B0, type: bool }
      - from: { target: slider_6_b1.pressed }
        to:   { address: /avatar/parameters/Slider6B1, type: bool }
      - from: { target: slider_6_b2.pressed }
        to:   { address: /avatar/parameters/Slider6B2, type: bool }

      - from: { target: slider_7_b0.pressed }
        to:   { address: /avatar/parameters/Slider7B0, type: bool }
      - from: { target: slider_7_b1.pressed }
        to:   { address: /avatar/parameters/Slider7B1, type: bool }
      - from: { target: slider_7_b2.pressed }
        to:   { address: /avatar/parameters/Slider7B2, type: bool }

      - from: { target: slider_8_b0.pressed }
        to:   { address: /avatar/parameters/Slider8B0, type: bool }
      - from: { target: slider_8_b1.pressed }
        to:   { address: /avatar/parameters/Slider8B1, type: bool }
      - from: { target: slider_8_b2.pressed }
        to:   { address: /avatar/parameters/Slider8B2, type: bool }

      - from: { target: slider_9_b0.pressed }
        to:   { address: /avatar/parameters/Slider9B0, type: bool }
      - from: { target: slider_9_b1.pressed }
        to:   { address: /avatar/parameters/Slider9B1, type: bool }
      - from: { target: slider_9_b2.pressed }
        to:   { address: /avatar/parameters/Slider9B2, type: bool }

      # ポリアフタータッチ 10スロット（各 3bit）
      - from: { target: pressure_0_b0.pressed }
        to:   { address: /avatar/parameters/Pressure0B0, type: bool }
      - from: { target: pressure_0_b1.pressed }
        to:   { address: /avatar/parameters/Pressure0B1, type: bool }
      - from: { target: pressure_0_b2.pressed }
        to:   { address: /avatar/parameters/Pressure0B2, type: bool }

      - from: { target: pressure_1_b0.pressed }
        to:   { address: /avatar/parameters/Pressure1B0, type: bool }
      - from: { target: pressure_1_b1.pressed }
        to:   { address: /avatar/parameters/Pressure1B1, type: bool }
      - from: { target: pressure_1_b2.pressed }
        to:   { address: /avatar/parameters/Pressure1B2, type: bool }

      - from: { target: pressure_2_b0.pressed }
        to:   { address: /avatar/parameters/Pressure2B0, type: bool }
      - from: { target: pressure_2_b1.pressed }
        to:   { address: /avatar/parameters/Pressure2B1, type: bool }
      - from: { target: pressure_2_b2.pressed }
        to:   { address: /avatar/parameters/Pressure2B2, type: bool }

      - from: { target: pressure_3_b0.pressed }
        to:   { address: /avatar/parameters/Pressure3B0, type: bool }
      - from: { target: pressure_3_b1.pressed }
        to:   { address: /avatar/parameters/Pressure3B1, type: bool }
      - from: { target: pressure_3_b2.pressed }
        to:   { address: /avatar/parameters/Pressure3B2, type: bool }

      - from: { target: pressure_4_b0.pressed }
        to:   { address: /avatar/parameters/Pressure4B0, type: bool }
      - from: { target: pressure_4_b1.pressed }
        to:   { address: /avatar/parameters/Pressure4B1, type: bool }
      - from: { target: pressure_4_b2.pressed }
        to:   { address: /avatar/parameters/Pressure4B2, type: bool }

      - from: { target: pressure_5_b0.pressed }
        to:   { address: /avatar/parameters/Pressure5B0, type: bool }
      - from: { target: pressure_5_b1.pressed }
        to:   { address: /avatar/parameters/Pressure5B1, type: bool }
      - from: { target: pressure_5_b2.pressed }
        to:   { address: /avatar/parameters/Pressure5B2, type: bool }

      - from: { target: pressure_6_b0.pressed }
        to:   { address: /avatar/parameters/Pressure6B0, type: bool }
      - from: { target: pressure_6_b1.pressed }
        to:   { address: /avatar/parameters/Pressure6B1, type: bool }
      - from: { target: pressure_6_b2.pressed }
        to:   { address: /avatar/parameters/Pressure6B2, type: bool }

      - from: { target: pressure_7_b0.pressed }
        to:   { address: /avatar/parameters/Pressure7B0, type: bool }
      - from: { target: pressure_7_b1.pressed }
        to:   { address: /avatar/parameters/Pressure7B1, type: bool }
      - from: { target: pressure_7_b2.pressed }
        to:   { address: /avatar/parameters/Pressure7B2, type: bool }

      - from: { target: pressure_8_b0.pressed }
        to:   { address: /avatar/parameters/Pressure8B0, type: bool }
      - from: { target: pressure_8_b1.pressed }
        to:   { address: /avatar/parameters/Pressure8B1, type: bool }
      - from: { target: pressure_8_b2.pressed }
        to:   { address: /avatar/parameters/Pressure8B2, type: bool }

      - from: { target: pressure_9_b0.pressed }
        to:   { address: /avatar/parameters/Pressure9B0, type: bool }
      - from: { target: pressure_9_b1.pressed }
        to:   { address: /avatar/parameters/Pressure9B1, type: bool }
      - from: { target: pressure_9_b2.pressed }
        to:   { address: /avatar/parameters/Pressure9B2, type: bool }

      # scene_index は受信専用のため output に含めない
