language = "C"
include_guard = "MIDORI_SDK_H"
header = "/* Auto-generated by cbindgen. Do not edit. */"
no_includes = true
sys_includes = ["stdint.h", "stddef.h"]
cpp_compat = true
documentation = true
documentation_style = "doxy"
style = "type"

[parse]
parse_deps = true
include = ["midori-core"]

[export]
prefix = ""

[fn]
prefix = ""
